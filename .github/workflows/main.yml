name: Extração semanal

on:
  schedule:
    - cron: '0 0 * * 0' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  extrair-dados:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar Poetry
        run: |
          pipx install poetry
          poetry --version

      - name: Instalar Dependências
        run: poetry install --no-interaction

      - name: Executar Script de Extração
        env:
          EARTH_ENGINE_KEY: ${{ secrets.EARTH_ENGINE_KEY }}
          NOME_EXCEL: analise.xlsx
          PASTA_AREAS: areas
        run: poetry run python extrator.py

      - name: Salvar analise.xlsx no Repositório
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add analise.xlsx
          git commit -m "chore: atualização semanal de dados orbitais [skip ci]" || exit 0 
          # o '|| exit 0' acima evita que o workflow falhe se não houver dados novos para commitar
          git push